<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Ideas - Idea Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="professional.css" />
</head>
<body>
  <!-- Navigation Sidebar -->
  <aside class="nav-sidebar">
    <div class="nav-brand">
      <div class="nav-brand-logo">IMS</div>
      <div class="nav-brand-title">Idea Management</div>
      <div class="nav-brand-subtitle">Innovation Hub</div>
    </div>
    <div class="nav-menu" id="nav-menu"></div>
    <div class="nav-footer">
      <div class="user-profile">
        <button id="user-menu-btn" class="user-avatar" aria-label="User menu">
          <span id="user-initials">U</span>
        </button>
        <div id="user-dropdown" class="user-dropdown hidden">
          <div class="user-info">
            <div class="user-avatar-large">
              <span id="user-initials-large">U</span>
            </div>
            <div>
              <div class="user-name" id="user-name-display">User</div>
              <div class="user-email" id="user-email-display">user@example.com</div>
            </div>
          </div>
          <div class="dropdown-divider"></div>
          <button id="logout-btn" class="dropdown-item">
            <span>🚪</span> Logout
          </button>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="content-header">
      <div class="content-header-top">
        <div>
          <h1 class="content-title">My Ideas</h1>
          <p class="content-subtitle">Manage all your submitted ideas</p>
        </div>
        <div style="display: flex; gap: 12px;">
          <button class="back-button" onclick="navManager.goBack()">
            <span class="back-icon">←</span>
            <span>Back</span>
          </button>
          <button class="btn btn-primary" onclick="showNewIdeaModal()">
            <span>+</span> New Idea
          </button>
        </div>
      </div>
      <div id="breadcrumbs-container"></div>
    </div>

    <div class="content-body">
      <!-- Stats Overview -->
      <div class="grid-4" style="margin-bottom: 32px;">
        <div class="stat-card-pro">
          <div class="stat-icon">💡</div>
          <div class="stat-value" id="my-total-ideas">0</div>
          <div class="stat-label">Total Ideas</div>
        </div>
        <div class="stat-card-pro">
          <div class="stat-icon">👍</div>
          <div class="stat-value" id="my-total-votes">0</div>
          <div class="stat-label">Total Votes</div>
        </div>
        <div class="stat-card-pro">
          <div class="stat-icon">💬</div>
          <div class="stat-value" id="my-total-comments">0</div>
          <div class="stat-label">Total Comments</div>
        </div>
        <div class="stat-card-pro">
          <div class="stat-icon">⭐</div>
          <div class="stat-value" id="my-avg-rating">0.0</div>
          <div class="stat-label">Avg Rating</div>
        </div>
      </div>

      <!-- Filters -->
      <div class="card" style="margin-bottom: 24px;">
        <div style="display: flex; gap: 16px; flex-wrap: wrap; align-items: center;">
          <input type="text" id="search-my-ideas" placeholder="🔍 Search my ideas..." 
                 style="flex: 1; min-width: 250px; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);">
          
          <select id="filter-my-category" style="padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);">
            <option value="">All Categories</option>
            <option value="Product">Product</option>
            <option value="Process">Process</option>
            <option value="Marketing">Marketing</option>
            <option value="Social">Social</option>
          </select>
          
          <select id="filter-my-stage" style="padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);">
            <option value="">All Stages</option>
            <option value="Idea">Idea</option>
            <option value="Screening">Screening</option>
            <option value="Prototype">Prototype</option>
            <option value="Implementation">Implementation</option>
          </select>

          <select id="sort-my-ideas" style="padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="votes">Most Votes</option>
            <option value="rating">Highest Rating</option>
          </select>
        </div>
      </div>

      <!-- Ideas List -->
      <div id="my-ideas-list"></div>

      <!-- Empty State -->
      <div id="empty-state" class="empty-state" style="display: none;">
        <div class="empty-state-icon">💡</div>
        <h2 class="empty-state-title">No Ideas Yet</h2>
        <p class="empty-state-text">Start contributing by creating your first idea!</p>
        <button class="btn btn-primary btn-lg" onclick="showNewIdeaModal()">
          <span>+</span> Create First Idea
        </button>
      </div>

      <!-- Loading State -->
      <div id="loading-state" class="loading">
        <div class="spinner"></div>
      </div>
    </div>
  </main>

  <!-- New Idea Modal -->
  <div id="new-idea-modal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 600px;">
      <div class="modal-header">
        <h2>Create New Idea</h2>
        <button onclick="closeNewIdeaModal()" class="close-btn">×</button>
      </div>
      <form id="new-idea-form">
        <div style="display: flex; flex-direction: column; gap: 16px;">
          <div>
            <label>Title *</label>
            <input type="text" id="new-idea-title" required placeholder="Enter idea title">
          </div>
          <div>
            <label>Description *</label>
            <textarea id="new-idea-description" required placeholder="Describe your idea" rows="4"></textarea>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div>
              <label>Category *</label>
              <select id="new-idea-category" required>
                <option value="">Select category</option>
                <option value="Product">Product</option>
                <option value="Process">Process</option>
                <option value="Marketing">Marketing</option>
                <option value="Social">Social</option>
              </select>
            </div>
            <div>
              <label>Stage *</label>
              <select id="new-idea-stage" required>
                <option value="Idea">Idea</option>
                <option value="Screening">Screening</option>
                <option value="Prototype">Prototype</option>
                <option value="Implementation">Implementation</option>
              </select>
            </div>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;">
            <div>
              <label>Impact (1-5) *</label>
              <input type="number" id="new-idea-impact" min="1" max="5" required value="3">
            </div>
            <div>
              <label>Feasibility (1-5) *</label>
              <input type="number" id="new-idea-feasibility" min="1" max="5" required value="3">
            </div>
            <div>
              <label>Rating (1-5) *</label>
              <input type="number" id="new-idea-rating" min="1" max="5" required value="3">
            </div>
          </div>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 24px; justify-content: flex-end;">
          <button type="button" class="btn btn-secondary" onclick="closeNewIdeaModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Idea</button>
        </div>
      </form>
    </div>
  </div>

  <script src="navigation.js"></script>
  <script src="my-ideas.js"></script>
</body>
</html>
