<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Idea Management System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #f2f4f8;
      --panel: #ffffff;
      --ink: #1a1f2b;
      --muted: #586174;
      --primary: #d72555;
      --accent: #f4a42b;
      --border: #e2e6ec;
      --shadow: 0 14px 35px rgba(20, 32, 60, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #ffe3ec 0%, #f9fafb 40%, #f2f4f8 100%);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-container {
      width: 100%;
      max-width: 450px;
      background: var(--panel);
      padding: 40px;
      border-radius: 16px;
      border: 2px solid #ffcdd9;
      box-shadow: 0 20px 40px rgba(215, 37, 85, 0.15);
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #d72555, #ff4d7d);
      color: #fff;
      border-radius: 16px;
      display: inline-grid;
      place-items: center;
      font-weight: 700;
      font-size: 24px;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .admin-badge {
      background: linear-gradient(135deg, #d72555, #ff4d7d);
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      display: inline-block;
      margin-bottom: 16px;
      box-shadow: 0 4px 12px rgba(215, 37, 85, 0.3);
    }

    h1 {
      font-family: "Archivo", sans-serif;
      font-size: 28px;
      margin-bottom: 8px;
      color: var(--ink);
    }

    .subtitle {
      color: var(--muted);
      font-size: 15px;
    }

    .warning-box {
      background: linear-gradient(135deg, #fff3e0 0%, #ffebee 100%);
      border: 1px solid #ffcdd9;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 24px;
      font-size: 13px;
      color: #c62828;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .warning-box span {
      font-size: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
      color: var(--ink);
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      background: #fbfcfe;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(215, 37, 85, 0.1);
    }

    input.error {
      border-color: #ef4444;
      background: #fef2f2;
    }

    .error-message {
      color: #ef4444;
      font-size: 13px;
      margin-top: 6px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .password-toggle {
      position: relative;
    }

    .password-toggle input {
      padding-right: 45px;
    }

    .toggle-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: var(--muted);
      padding: 4px;
    }

    .toggle-btn:hover {
      color: var(--primary);
    }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, #d72555, #ff4d7d);
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.2s ease;
      margin-bottom: 16px;
      font-family: inherit;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(215, 37, 85, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .divider {
      text-align: center;
      margin: 24px 0;
      position: relative;
    }

    .divider::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      width: 100%;
      height: 1px;
      background: var(--border);
    }

    .divider span {
      background: var(--panel);
      padding: 0 16px;
      position: relative;
      color: var(--muted);
      font-size: 14px;
    }

    .back-link {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .back-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .back-link a:hover {
      text-decoration: underline;
    }

    .demo-credentials {
      background: linear-gradient(135deg, #fff3e0 0%, #ffebee 100%);
      border: 1px solid #ffcdd9;
      border-radius: 10px;
      padding: 16px;
      margin-top: 24px;
      font-size: 13px;
    }

    .demo-credentials strong {
      display: block;
      margin-bottom: 8px;
      color: var(--primary);
      font-size: 14px;
    }

    .demo-credentials p {
      margin: 4px 0;
      color: var(--muted);
    }

    .demo-credentials code {
      background: var(--panel);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--ink);
      font-family: monospace;
    }

    @media (max-width: 480px) {
      .auth-container {
        padding: 30px 24px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="logo-section">
      <div class="logo">👑</div>
      <span class="admin-badge">🔐 ADMIN ACCESS</span>
      <h1>Admin Portal</h1>
      <p class="subtitle">Administrator authentication required</p>
    </div>

    <div class="warning-box">
      <span>⚠️</span>
      <div>This area is restricted to authorized administrators only.</div>
    </div>

    <form id="admin-login-form">
      <div class="form-group">
        <label for="email">Admin Email</label>
        <input type="email" id="email" placeholder="Enter admin email" autocomplete="email" required />
        <div id="email-error" class="error-message"></div>
      </div>

      <div class="form-group">
        <label for="password">Admin Password</label>
        <div class="password-toggle">
          <input type="password" id="password" placeholder="Enter admin password" autocomplete="current-password" required />
          <button type="button" class="toggle-btn" id="toggle-password" aria-label="Toggle password visibility">👁️</button>
        </div>
        <div id="password-error" class="error-message"></div>
      </div>

      <button type="submit" class="btn" id="login-btn">Access Admin Panel</button>

      <div class="divider">
        <span>or</span>
      </div>

      <div class="back-link">
        <a href="login.html">← Back to User Login</a>
      </div>
    </form>

    <div class="demo-credentials">
      <strong>🔑 Default Admin Credentials</strong>
      <p>Email: <code>admin@ims.com</code></p>
      <p>Password: <code>admin123</code></p>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById("admin-login-form");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const togglePasswordBtn = document.getElementById("toggle-password");
    const emailError = document.getElementById("email-error");
    const passwordError = document.getElementById("password-error");
    const loginBtn = document.getElementById("login-btn");

    // Check if already logged in as admin
    const currentAdmin = localStorage.getItem("imsAdminUser");
    if (currentAdmin) {
      window.location.href = "admin-dashboard.html";
    }

    // Toggle password visibility
    togglePasswordBtn.addEventListener("click", () => {
      const type = passwordInput.type === "password" ? "text" : "password";
      passwordInput.type = type;
      togglePasswordBtn.textContent = type === "password" ? "👁️" : "🙈";
    });

    // Clear error on input
    emailInput.addEventListener("input", () => {
      emailInput.classList.remove("error");
      emailError.classList.remove("show");
    });

    passwordInput.addEventListener("input", () => {
      passwordInput.classList.remove("error");
      passwordError.classList.remove("show");
    });

    async function apiRequest(path, options = {}) {
      const response = await fetch(path, {
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        ...options
      });

      let payload = {};
      try {
        payload = await response.json();
      } catch (_error) {
        payload = {};
      }

      if (!response.ok) {
        throw new Error(payload.message || "Request failed");
      }
      return payload;
    }

    // Form submission
    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      
      // Clear previous errors
      emailInput.classList.remove("error");
      passwordInput.classList.remove("error");
      emailError.classList.remove("show");
      passwordError.classList.remove("show");

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      // Validation
      let hasError = false;

      if (!email) {
        emailInput.classList.add("error");
        emailError.textContent = "Admin email is required";
        emailError.classList.add("show");
        hasError = true;
      } else if (!isValidEmail(email)) {
        emailInput.classList.add("error");
        emailError.textContent = "Please enter a valid email address";
        emailError.classList.add("show");
        hasError = true;
      }

      if (!password) {
        passwordInput.classList.add("error");
        passwordError.textContent = "Admin password is required";
        passwordError.classList.add("show");
        hasError = true;
      }

      if (hasError) return;

      try {
        loginBtn.disabled = true;
        loginBtn.textContent = "Accessing...";

        const data = await apiRequest("/api/auth/admin/login", {
          method: "POST",
          body: JSON.stringify({ email, password })
        });

        localStorage.setItem("imsAdminUser", JSON.stringify(data.admin));
        window.location.href = "admin-dashboard.html";
      } catch (error) {
        passwordInput.classList.add("error");
        passwordError.textContent = error.message || "Invalid admin credentials";
        passwordError.classList.add("show");
        loginBtn.disabled = false;
        loginBtn.textContent = "Access Admin Panel";
      }
    });

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }
  </script>
</body>
</html>
